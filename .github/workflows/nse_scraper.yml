name: SEBI PIT Insider Trading Scraper (NSE)

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Space-separated list of NSE tickers to sync (leave blank for default)'
        required: false
        default: ''

jobs:
  scrape_and_sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'web/scripts/requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r web/scripts/requirements.txt

      - name: Sync Live SEBI PIT Disclosures to Neon Postgres
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            python web/scripts/sync_nse_to_postgres.py ${{ github.event.inputs.tickers }}
          else
            python web/scripts/sync_nse_to_postgres.py
          fi
